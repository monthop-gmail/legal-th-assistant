services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: legal-th-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-th-app
    depends_on:
      - chromadb
    volumes:
      - ./laws:/app/laws:ro
      - ./scripts:/app/scripts
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_TOKEN=${HF_TOKEN}
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    command: ["python", "-u", "scripts/ingest_laws.py"]

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: legal-th-mcp
    depends_on:
      - chromadb
    ports:
      - "8200:8200"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - HF_TOKEN=${HF_TOKEN}
    restart: unless-stopped

volumes:
  chroma_data:
